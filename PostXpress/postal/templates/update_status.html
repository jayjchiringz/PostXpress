<!-- update_status.html -->
{% extends 'base.html' %}
{% block title %}
    Update Parcel Status
{% endblock %}
{% block content %}
<div class="container mt-5">
    <h2>Update Parcel Status</h2>
        <!-- Display Messages -->
		{% if messages %}
			<ul class="messages">
				{% for message in messages %}
					<li class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">{{ message }}</li>
				{% endfor %}
			</ul>
		{% endif %}	
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="tracking_number">Tracking Number:</label>
            <input type="text" name="tracking_number" id="tracking_number" class="form-control" placeholder="Enter tracking number" required>
        </div>
        <br>
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-3">Update Status</button>
    </form>
</div>
{% endblock %}
