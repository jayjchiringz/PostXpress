<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostXpress - Frontend</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Register a Parcel</h1>
        <form id="parcelForm">
            <div class="mb-3">
                <label for="trackingNumber" class="form-label">Tracking Number</label>
                <input type="text" class="form-control" id="trackingNumber" required>
            </div>
            <div class="mb-3">
                <label for="sender" class="form-label">Sender ID</label>
                <input type="number" class="form-control" id="sender" required>
            </div>
            <div class="mb-3">
                <label for="receiverName" class="form-label">Receiver Name</label>
                <input type="text" class="form-control" id="receiverName" required>
            </div>
            <div class="mb-3">
                <label for="receiverPhone" class="form-label">Receiver Phone</label>
                <input type="text" class="form-control" id="receiverPhone" required>
            </div>
            <div class="mb-3">
                <label for="originLocation" class="form-label">Origin Location</label>
                <input type="text" class="form-control" id="originLocation" required>
            </div>
            <div class="mb-3">
                <label for="destination" class="form-label">Destination</label>
                <input type="text" class="form-control" id="destination" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit Parcel</button>
        </form>

        <div id="responseMessage" class="mt-3"></div>
    </div>

    <!-- Bootstrap JS & dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script to handle form submission -->
    <script>
        document.getElementById('parcelForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const trackingNumber = document.getElementById('trackingNumber').value;
            const sender = document.getElementById('sender').value;
            const receiverName = document.getElementById('receiverName').value;
            const receiverPhone = document.getElementById('receiverPhone').value;
            const originLocation = document.getElementById('originLocation').value;
            const destination = document.getElementById('destination').value;

            const data = {
                tracking_number: trackingNumber,
                sender: sender,
                receiver_name: receiverName,
                receiver_phone: receiverPhone,
                origin_location: originLocation,
                destination: destination
            };

            fetch('http://127.0.0.1:8000/api/parcels/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('responseMessage').innerHTML = 
                    `<div class="alert alert-success">Parcel Registered Successfully!</div>`;
                console.log('Success:', data);
            })
            .catch((error) => {
                document.getElementById('responseMessage').innerHTML = 
                    `<div class="alert alert-danger">Error: ${error.message}</div>`;
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
