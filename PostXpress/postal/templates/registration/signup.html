{% extends 'base.html' %}
{% load static %}

{% block title %}
    Sign Up
{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Sign Up</h2>
    <!-- Parcel registration form -->
	<form method="POST">
		{% csrf_token %}
		{{ form.as_p }}
		<button type="submit" style="text-transform: none;">Register</button>
	</form>

</div>
{% endblock %}

<!-- Optional JavaScript for Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
