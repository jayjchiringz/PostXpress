# render.yaml
services:
  - type: web
    name: postxpress-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: |
      echo "🔍 Current directory: $(pwd)"
      echo "📂 Full directory structure:"
      ls -la
      echo "🔧 Creating virtual environment..."
      python -m venv venv
      echo "✅ Virtual environment created"
      echo "🔧 Activating virtual environment..."
      source venv/bin/activate
      echo "📦 Installing dependencies..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "✅ Dependencies installed"
      
      # Verify manage.py exists
      if [ -f "manage.py" ]; then
        echo "✅ manage.py found in current directory"
      else
        echo "❌ manage.py not found in current directory"
        ls -la
        exit 1
      fi
      
      echo "🎨 Collecting static files..."
      python manage.py collectstatic --noinput
      echo "✅ Static files collected"
      echo "🗄️ Running migrations..."
      python manage.py migrate
      echo "✅ Migrations complete"
      
      # Verify gunicorn is installed
      echo "🔍 Checking gunicorn installation..."
      which gunicorn || echo "❌ gunicorn not found in PATH"
      ls -la venv/bin/ | grep gunicorn || echo "❌ gunicorn not in venv/bin"
      
    startCommand: |
      cd /opt/render/project/src
      source venv/bin/activate
      echo "🚀 Starting gunicorn server from $(pwd)..."
      echo "🔍 Gunicorn path: $(which gunicorn)"
      exec gunicorn PostXpress.wsgi:application --workers 4 --worker-class sync --timeout 120 --access-logfile '-' --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: PostXpress.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://farm-fuzion-frontend-vercel.vercel.app,https://farm-fuzion-backend.onrender.com,http://localhost:3000"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://farm-fuzion-frontend-vercel.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: postxpress-db
          property: connectionString
      - key: AFRICASTALKING_USERNAME
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: "https://postxpress-api.onrender.com/mpesa-callback/"

databases:
  - name: postxpress-db
    databaseName: postxpress
    user: postxpress_user
    plan: free