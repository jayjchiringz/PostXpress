# render.yaml - for reference only
services:
  - type: web
    name: postxpress-api-v2
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: PostXpress.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://farm-fuzion-frontend-vercel.vercel.app,https://farm-fuzion-backend.onrender.com,http://localhost:3000"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://farm-fuzion-frontend-vercel.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: postxpress-db
          property: connectionString
      - key: AFRICASTALKING_USERNAME
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: "https://postxpress-api.onrender.com/mpesa-callback/"

databases:
  - name: postxpress-db
    databaseName: postxpress
    user: postxpress_user
    plan: free